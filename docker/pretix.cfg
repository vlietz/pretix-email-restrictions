[pretix]
instance_name=pretix-email-restrictions (dev)
url=http://localhost:8345
currency=EUR
; Comma-separated list of additional plugins to load beyond the bundled ones.
; pretix_email_restrictions is auto-discovered via the entry point installed
; in the Docker image, so it only needs to be enabled per-event in the UI.

[database]
backend=postgresql_psycopg2
name=pretix
user=pretix
password=pretix
host=db
port=5432

[cache]
; Use Redis as the cache and session backend.
backend=redis
location=redis://redis:6379/0

[celery]
; Use Redis as the message broker.
broker=redis://redis:6379/1
backend=redis://redis:6379/1

[mail]
; Print emails to stdout during development.
from=dev@localhost
backend=console

[locale]
default=en
timezone=UTC

[media]
; Uploaded files are stored inside /data in the container.

[logging]
email=
email_level=ERROR
